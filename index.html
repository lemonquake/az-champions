<!-- BUILD STAMP: 2026-07-03g — DIRECT BOOT: straight into gameplay, no intro, no main menu -->
<!-- ============================================================
     CRITICAL INLINE STYLES — the boot splash must paint instantly,
     before ANY external file (CSS or JS) loads. This is what kills
     the "black screen at start" on slow phones: the very first
     HTML paint already shows the studio splash + loading bar.
     ============================================================ -->
<style>
  html, body { height: 100%; margin: 0; padding: 0; background: #06070d; }
  #boot-splash {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 99999;
    background: radial-gradient(circle at 50% 40%, #15182e 0%, #06070d 80%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #e8eaf5;
    transition: opacity 0.5s ease-out;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #boot-splash.bs-out { opacity: 0; pointer-events: none; }
  
  #boot-splash .bs-inner {
    text-align: center;
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  
  #boot-splash .bs-logo-container {
    position: relative;
    width: 120px;
    height: 120px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  #boot-splash .bs-logo-bg {
    position: absolute;
    width: 100px;
    height: 100px;
    background: radial-gradient(circle, rgba(245, 197, 66, 0.2) 0%, transparent 70%);
    filter: blur(10px);
  }

  #boot-splash .bs-presenter {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 4px;
    color: #8b90ad;
    text-transform: uppercase;
  }
  
  #boot-splash .bs-title {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 6px;
    margin-top: 4px;
    color: #f5c542;
    background: linear-gradient(180deg, #ffffff, #f5c542 60%, #b8791e);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
  }
  
  #boot-splash .bs-title span {
    color: #fff;
  }

  #boot-splash .bs-track {
    width: 240px;
    height: 6px;
    background: #171a2b;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 15px;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }
  
  #boot-splash .bs-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #f5c542, #ff8c3a);
    box-shadow: 0 0 8px rgba(245, 197, 66, 0.5);
    transition: width 0.1s ease;
  }
  
  #boot-splash .bs-status {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #8b90ad;
    text-transform: uppercase;
    min-height: 14px;
  }
  
  #boot-splash noscript { display: block; margin-top: 18px; color: #ff8f8f; font-size: 13px; }
</style>

<!-- ============================================================
     EARLY BOOT GUARD — registered BEFORE any game script so that a
     parse/load error in ANY later file shows a readable overlay
     instead of a dead black screen. Also provides safeStorage and
     the loading-progress tick used by the splash.
     ============================================================ -->
<script>
(function() {
  /* ---- build id: single source of truth, shown on the Main Menu so a
     stale cached/installed build is identifiable from a screenshot ---- */
  window.AZ_BUILD = '20260703g';

  /* ---- safeStorage: localStorage with in-memory fallback ---- */
  var memStore = {};
  window.safeStorage = {
    getItem: function(key) {
      try { return window.localStorage.getItem(key); }
      catch (e) { return memStore.hasOwnProperty(key) ? memStore[key] : null; }
    },
    setItem: function(key, val) {
      try { window.localStorage.setItem(key, val); }
      catch (e) { memStore[key] = String(val); }
    },
    removeItem: function(key) {
      try { window.localStorage.removeItem(key); }
      catch (e) { delete memStore[key]; }
    },
    clear: function() {
      try { window.localStorage.clear(); }
      catch (e) { for (var k in memStore) delete memStore[k]; }
    }
  };

  /* ---- readable fatal-error overlay (works with zero CSS) ---- */
  window.__bootShowError = function(msg) {
    try {
      if (document.getElementById('boot-error-overlay')) return;
      var el = document.createElement('div');
      el.id = 'boot-error-overlay';
      el.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:100000;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;background:rgba(5,6,11,0.97);padding:24px;color:#fff;font-family:sans-serif;';
      el.innerHTML =
        '<div style="max-width:380px;text-align:center;background:#171a2b;border:1px solid #2c3150;border-radius:18px;padding:26px 22px;">' +
        '<div style="font-size:20px;font-weight:900;color:#f5c542;margin-bottom:10px;letter-spacing:2px;">⚠️ AZ CHAMPIONS</div>' +
        '<p style="font-size:14px;color:#e8eaf5;margin-bottom:12px;line-height:1.5;">Something went wrong while starting the game.</p>' +
        '<code style="display:block;background:#0a0c15;color:#ff8f8f;font-size:11.5px;border-radius:8px;padding:10px;margin-bottom:16px;word-break:break-word;white-space:normal;font-family:monospace;text-align:left;max-height:120px;overflow-y:auto;">' + String(msg).slice(0, 300).replace(/</g, '&lt;') + '</code>' +
        '<button style="background:#e8a72e;color:#3a2a08;border:none;border-radius:12px;padding:12px 22px;font-weight:900;font-size:14px;cursor:pointer;letter-spacing:1px;" onclick="location.reload()">↻ RESTART GAME</button>' +
        '</div>';
      (document.body || document.documentElement).appendChild(el);
      var splash = document.getElementById('boot-splash');
      if (splash) splash.style.display = 'none';
    } catch (e) { /* nothing more we can do */ }
  };
  window.__bootReady = false;
  window.addEventListener('error', function(e) {
    if (window.__bootReady) return; /* after boot, main.js owns error UX */
    if (e.target && e.target.src) { window.__bootFail(e.target.src); return; }
    window.__bootShowError(e.message || 'Unknown startup error');
  }, true);
  window.addEventListener('unhandledrejection', function(e) {
    if (window.__bootReady) return;
    window.__bootShowError((e.reason && e.reason.message) || 'Unknown startup error');
  });

  /* ---- splash progress ticks (called after each script parses) ---- */
  var STEPS = 8, step = 0;
  window.__bootTick = function(label) {
    step++;
    try {
      var bar = document.getElementById('bs-bar');
      var st = document.getElementById('bs-status');
      if (bar) bar.style.width = Math.min(100, Math.round(step / STEPS * 100)) + '%';
      if (st) st.textContent = label ? label.toUpperCase() : '';
    } catch (e) {}
  };
  /* ---- script-load failure: self-heal before giving up ----
     A failed script usually means the page came from browser cache
     while the game server restarted (or a Wi-Fi blip). If the server
     answers, ONE automatic fresh reload fixes it without bothering
     the player. Only a genuinely unreachable server shows the error. */
  window.__bootFail = function(src) {
    var msg = 'Could not load ' + src + '. If you started the game with PLAY.cmd, ' +
              'make sure its black window is still open, then press RESTART GAME.';
    var retried = false;
    try { retried = sessionStorage.getItem('az_boot_retry') === '1'; } catch (e) { retried = true; }
    if (!retried && window.fetch && location.protocol !== 'file:') {
      try { sessionStorage.setItem('az_boot_retry', '1'); } catch (e) {}
      fetch(location.pathname || './', { cache: 'no-store' })
        .then(function(r) {
          if (r.ok) { location.reload(); }
          else { window.__bootShowError(msg); }
        })
        .catch(function() { window.__bootShowError(msg); });
      return;
    }
    window.__bootShowError(msg);
  };
})();
</script>

<body>

  <script>__bootTick('Store');</script>
